name: Deploy to VPS (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy (opcional)'
        required: false
        default: 'Atualização de rotina'

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "==> Motivo informado: ${{ github.event.inputs.reason }}"
            echo "==> Acessando diretório do projeto"
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "==> Atualizando código fonte"
            git pull origin main

            echo "==> Sincronizando dependências Python"
            ${{ secrets.VPS_PROJECT_PATH }}/.venv/bin/pip install -r requirements.txt

            echo "==> Aplicando migrações do Banco de Dados"
            ${{ secrets.VPS_PROJECT_PATH }}/.venv/bin/python manage.py migrate --noinput

            echo "==> Coletando arquivos estáticos"
            ${{ secrets.VPS_PROJECT_PATH }}/.venv/bin/python manage.py collectstatic --noinput

            echo "==> Reiniciando o serviço Gunicorn"
            sudo systemctl restart church.service

            echo "✅ Deploy concluído com sucesso!"
